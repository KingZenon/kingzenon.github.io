<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Table 2</title>
</head>
<body>
    <h1>Receipt Vouncher</h1>
    <table border="1" cellspacing="0" cellpadding="30">
        <thead>
            <tr>
                <th>No.</th>
                <th>Item Name</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Amount</th>
            </tr>

        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Starbucks</td>
                <td>6000</td>
                <td>1</td>
                <td>6000</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Alpine 1 litre</td>
                <td>1000</td>
                <td>3</td>
                <td>3000</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Sp Bakery</td>
                <td>1200</td>
                <td>3</td>
                <td>3600</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4">Total</td>
                <td>12600</td>
            </tr>
        </tfoot>
    </table>

    <h1>Save Money</h1>
    <table border="1" cellspacing="0" cellpadding="30">
        <thead>
            <tr>
                <th>Months</th>
                <th>Save Money</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>January</td>
                <td>100000</td>
                <td rowspan="4">600000</td>
            </tr>
            <tr>
                <td>February</td>
                <td>50000</td>
            </tr>
            <tr>
                <td>March</td>
                <td>150000</td>
            </tr>
            <tr>
                <td>April</td>
                <td>300000</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
