<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div {
            margin: 50px;
            padding: 100px;
            border: 1px solid black;
            text-align: center;
            font-size: 20px;
        }
        .color1 {
            color: brown;

            /*hex
            0 = lowest
            F = highest
            #RRGGBB
            #RGB */
            background-color: #00ff6e;
            opacity: 0.6;
        }

        .color2 {
            /* RGB code
            0 - 255 */
            background-color: rgb(77,14,14);
        }

        .color3 {
            background-color: rgba(77,14,14,0.7);
        }
    </style>
</head>
<body>
    <div class="color1">Color 1</div>
    <div class="color2">Color 2</div>
    <div class="color3">Color 3</div>
</body>
</html>
